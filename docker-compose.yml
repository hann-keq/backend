version: '3.8'
services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=your_password
      - DB_NAME=mydatabase
    depends_on:
      - db
    healthcheck:
      test: curl -f http://localhost:8000/health
      interval: 5s
      timeout: 5s
      retries: 5

  db:
    image: mysql:8.0
    container_name: mysql
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=your_password
      - MYSQL_DATABASE=mydatabase
      - MYSQL_USER=root
      - MYSQL_PASSWORD=your_password
    healthcheck:
      test: curl -f http://localhost:3306/
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
    driver: local